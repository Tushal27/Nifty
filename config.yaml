# ---------------------------------------------------------------------------
# Nifty 50 next-day direction prediction — configuration
# ---------------------------------------------------------------------------

data:
  # Where to get data from:
  #   "yfinance" -> Yahoo Finance ^NSEI   (history only reaches ~2007)
  #   "nse"      -> niftyindices.com API   (reaches index inception ~1996 — the max)
  # A non-null csv_path below overrides this and loads your own file instead.
  source: "yfinance"
  ticker: "^NSEI"          # used when source == yfinance
  nse_index_name: "NIFTY 50"  # used when source == nse (e.g. "NIFTY 50", "NIFTY BANK")
  start: "1990-01-01"      # APIs return from the earliest they actually have
  end: null                # null => today
  # Point this at your own long-history file to override the API fetch.
  # Expected columns (case-insensitive): Date, Open, High, Low, Close, Volume
  csv_path: null
  cache_path: "data/nifty.parquet"

features:
  sma_windows: [10, 20, 50, 200]
  ema_windows: [10, 20, 50]
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bb_period: 20
  bb_std: 2.0
  atr_period: 14
  vol_window: 20
  momentum_windows: [5, 10, 20]

# Toggle individual models on/off. tensorflow (lstm) is off by default because
# it is a heavy dependency; enable it after `pip install tensorflow`.
models:
  logistic: true
  random_forest: true
  xgboost: true
  lightgbm: true
  lstm: false

lstm:
  window: 20               # number of past days fed to the sequence model
  epochs: 15
  batch_size: 32
  units: 32

evaluate:
  n_splits: 5              # TimeSeriesSplit walk-forward folds
  select_metric: "roc_auc" # metric used to pick the "best" model

backtest:
  threshold: 0.5           # go long when P(up) > threshold, else flat
  allow_short: false       # if true, go short when P(up) < (1 - threshold)
  cost_bps: 2.0            # per-trade transaction cost in basis points
  trading_days: 252        # for annualising Sharpe / CAGR

output:
  dir: "outputs"
  charts_dir: "outputs/charts"
  metrics_csv: "outputs/metrics.csv"
  signal_json: "outputs/latest_signal.json"

random_seed: 42
